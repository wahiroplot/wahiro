<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahiro - v32.0 CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; }
        .babylon-font { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 4px; color: white; text-transform: uppercase; }
        .sidebar-dark { background: #000000; color: white; }
        .nav-btn { width: calc(100% - 2rem); margin: 0.25rem 1rem; padding: 1rem 1.5rem; border-radius: 12px; display: flex; align-items: center; gap: 1rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; transition: all 0.2s; border: none; cursor: pointer; }
        .nav-btn.active { background: #1e293b; color: white; box-shadow: inset 4px 0 0 white; }
        .btn-industrial { background: white; color: black; font-weight: 900; text-transform: uppercase; clip-path: polygon(0% 15%, 15% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%); }
        .details-panel { max-height: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: #f8fafc; opacity: 0; }
        .details-panel.open { max-height: 1000px; opacity: 1; border-top: 1px solid #e2e8f0; }
        .price-input { font-family: monospace; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(22px); }
        .express-active-ui { border: 2px solid #10b981 !important; background: #f0fdf4 !important; }
        .missing-input-ui { border-left: 12px solid #f43f5e !important; background: #fff1f2 !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="antialiased">
    <div id="main-ui" class="min-h-screen flex flex-col md:flex-row no-print">
        <aside class="w-full md:w-72 sidebar-dark flex flex-col shrink-0">
            <div class="p-10 text-center border-b border-white/5">
                <h1 class="babylon-font text-2xl">Wahiro</h1>
                <p class="text-[8px] tracking-[0.3em] text-slate-500 font-bold mt-2 uppercase">Producción y Control</p>
                <span class="text-[7px] text-emerald-500 font-bold uppercase mt-1 block">Cloud v32.0</span>
            </div>
            <nav class="flex-1 mt-6">
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn active"><i class="fas fa-chart-pie"></i> Dashboard</button>
                <button onclick="switchTab('orders')" id="btn-orders" class="nav-btn"><i class="fas fa-layer-group"></i> Línea de Trabajo</button>
                <button onclick="switchTab('shopping')" id="btn-shopping" class="nav-btn text-orange-400"><i class="fas fa-shopping-cart"></i> Lista de Compras</button>
                <button onclick="switchTab('accounting')" id="btn-accounting" class="nav-btn"><i class="fas fa-list-ul"></i> Catálogo</button>
                <button onclick="switchTab('client')" id="btn-client" class="nav-btn text-blue-400"><i class="fas fa-search"></i> Seguimiento</button>
            </nav>
            <div class="p-6 space-y-3">
                <button onclick="openNormalModal()" class="w-full btn-industrial py-5 flex items-center justify-center gap-2 text-xs">
                    <i class="fas fa-plus"></i> Nueva Orden
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto">
            <div id="view-dashboard">
                <h2 class="text-4xl font-black text-slate-900 uppercase italic mb-10 tracking-tighter">Estado de Entregas</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                    <div class="stat-card bg-white p-10 rounded-[2.5rem] border-l-[12px] border-red-500 shadow-sm">
                        <p class="text-[10px] font-black text-red-600 uppercase tracking-widest">Entregar Hoy</p>
                        <p id="stat-today" class="text-7xl font-black mt-2 text-red-600">0</p>
                    </div>
                    <div class="stat-card bg-white p-10 rounded-[2.5rem] border-l-[12px] border-amber-500 shadow-sm">
                        <p class="text-[10px] font-black text-amber-600 uppercase tracking-widest">Pendientes</p>
                        <p id="stat-pending" class="text-7xl font-black mt-2 text-amber-500">0</p>
                    </div>
                    <div class="stat-card bg-white p-10 rounded-[2.5rem] border-l-[12px] border-slate-300 shadow-sm">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Para Mañana</p>
                        <p id="stat-tomorrow" class="text-7xl font-black mt-2 text-slate-400">0</p>
                    </div>
                </div>
            </div>

            <div id="view-orders" class="hidden">
                <h2 class="text-4xl font-black text-slate-900 uppercase italic mb-10 tracking-tighter">Línea de Trabajo</h2>
                <div id="orders-container" class="space-y-6"></div>
            </div>

            <div id="view-accounting" class="hidden">
                <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm max-w-5xl mx-auto">
                    <h2 class="text-2xl font-black uppercase italic mb-8">Catálogo</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <input type="text" id="cat-name-input" placeholder="Producto" class="p-4 rounded-xl bg-slate-50 border outline-none font-bold text-sm">
                        <select id="cat-unit-input" class="p-4 rounded-xl bg-slate-50 border outline-none font-black text-xs uppercase italic">
                            <option value="unit">Unidad</option>
                            <option value="m2">M²</option>
                        </select>
                        <input type="text" id="cat-price-input" value="0" class="price-input p-4 rounded-xl bg-slate-50 border outline-none font-bold text-sm" oninput="formatInputPrice(this)">
                        <button id="cat-main-btn" onclick="saveProduct()" class="bg-black text-white rounded-xl font-black uppercase text-xs p-4">Agregar</button>
                    </div>
                    <div class="border rounded-2xl overflow-hidden">
                        <table class="w-full text-left">
                            <tbody id="catalog-table-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-shopping" class="hidden">
                <h2 class="text-4xl font-black text-slate-900 uppercase italic mb-10 tracking-tighter">Lista de Compras</h2>
                <div id="shopping-list-container" class="space-y-4"></div>
            </div>

            <div id="view-client" class="hidden max-w-2xl mx-auto pt-10">
                <div class="bg-black text-white p-14 rounded-[4rem] text-center shadow-2xl">
                    <h2 class="babylon-font text-3xl mb-12">Wahiro Tracking</h2>
                    <input type="text" id="track-input" placeholder="W-XXXX" class="w-full bg-white/10 border border-white/20 p-7 rounded-3xl text-center font-mono text-4xl mb-6 uppercase outline-none">
                    <button onclick="checkTrack()" class="w-full bg-white text-black font-black py-6 rounded-3xl uppercase tracking-widest text-lg">Consultar</button>
                    <div id="track-result" class="mt-12"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[4rem] p-12 overflow-y-auto max-h-[92vh]">
            <div class="flex justify-between items-start mb-10">
                <h3 class="text-4xl font-black uppercase italic tracking-tighter">Nueva Orden</h3>
                <button onclick="closeModal()" class="text-slate-200 hover:text-black text-4xl"><i class="fas fa-times-circle"></i></button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <input type="text" id="order-client" placeholder="Cliente" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold outline-none">
                <input type="text" id="order-phone" placeholder="WhatsApp (sin 0 ni 15)" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold outline-none">
                <input type="date" id="order-delivery" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold outline-none">
            </div>

            <div id="order-items-section" class="bg-slate-50 p-8 rounded-[3rem] mb-8 border transition-all">
                <div class="flex items-center gap-3 mb-6 bg-white p-4 rounded-2xl w-fit">
                    <label class="switch"><input type="checkbox" id="express-toggle" onchange="handleExpressToggle()"><span class="slider"></span></label>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-500" id="express-label">Normal</span>
                </div>

                <div class="relative mb-4">
                    <input type="text" id="order-cat-search" onkeyup="filterOrderSelect()" placeholder="Buscar en catálogo..." class="w-full p-5 rounded-2xl border-none font-bold bg-white shadow-sm outline-none">
                    <div id="order-search-results" class="absolute left-0 right-0 top-full mt-2 bg-white rounded-2xl shadow-2xl z-[60] max-h-48 overflow-y-auto hidden border"></div>
                </div>

                <div id="item-config-area" class="hidden grid grid-cols-1 md:grid-cols-12 gap-4 items-end mb-6 bg-white/50 p-6 rounded-2xl border border-dashed">
                    <div class="md:col-span-3" id="field-qty">
                        <label class="text-[9px] font-black uppercase text-slate-400">Cant.</label>
                        <input type="number" id="order-item-qty" value="1" class="w-full p-5 rounded-2xl font-bold bg-white outline-none">
                    </div>
                    <div class="md:col-span-3 hidden" id="field-width">
                        <label class="text-[9px] font-black uppercase text-slate-400">Ancho (m)</label>
                        <input type="number" id="order-item-width" value="1" step="0.01" class="w-full p-5 rounded-2xl font-bold bg-white outline-none">
                    </div>
                    <div class="md:col-span-3 hidden" id="field-height">
                        <label class="text-[9px] font-black uppercase text-slate-400">Alto (m)</label>
                        <input type="number" id="order-item-height" value="1" step="0.01" class="w-full p-5 rounded-2xl font-bold bg-white outline-none">
                    </div>
                    <div class="md:col-span-3">
                        <button onclick="addItemToOrder()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-[10px]">Añadir</button>
                    </div>
                </div>

                <div id="order-temp-list" class="space-y-3 mb-6"></div>
                <textarea id="order-notes" placeholder="Notas adicionales..." class="w-full p-6 rounded-[2rem] border-none bg-white font-bold text-sm outline-none h-28 resize-none"></textarea>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center border-t pt-10 gap-8">
                <p id="order-total-display" class="text-6xl font-black italic tracking-tighter">$0</p>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <label class="block text-[10px] font-black uppercase text-slate-400">Seña</label>
                        <input type="text" id="order-advance" value="0" class="price-input w-48 text-right bg-emerald-50 text-emerald-700 p-4 rounded-xl font-black text-2xl outline-none" oninput="formatInputPrice(this)">
                    </div>
                    <button onclick="confirmOrder()" class="bg-black text-white px-10 py-7 rounded-[2rem] font-black uppercase tracking-widest text-xs">Generar Orden</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOrlX3-QgqTwW3ROqkT7DhRBETFIifmZM",
            authDomain: "wahiro-app.firebaseapp.com",
            databaseURL: "https://wahiro-app-default-rtdb.firebaseio.com",
            projectId: "wahiro-app",
            storageBucket: "wahiro-app.firebasestorage.app",
            messagingSenderId: "185713025633",
            appId: "1:185713025633:web:b254b098e8b54ab2dd8020"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ESTADO GLOBAL ---
        window.catalog = [];
        window.orders = [];
        let tempOrderItems = [];
        let selectedProduct = null;
        let isExpressActive = false;
        let editingProductId = null;

        // --- UTILIDADES ---
        const formatNumber = (num) => (num || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        const parseNum = (str) => parseFloat(str.toString().replace(/\./g, "")) || 0;
        window.formatInputPrice = (input) => { let val = input.value.replace(/\D/g, ""); input.value = val === "" ? "" : formatNumber(val); };

        // --- CARGA DE DATOS (NUBE) ---
        onValue(ref(db, 'catalog'), (snapshot) => {
            const data = snapshot.val();
            window.catalog = data ? Object.keys(data).map(id => ({id, ...data[id]})) : [];
            renderCatalog();
        });

        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            window.orders = data ? Object.keys(data).map(id => ({id, ...data[id]})) : [];
            renderOrders();
            renderShoppingList();
            updateDashboardStats();
        });

        // --- FUNCIONES CATALOGO ---
        window.saveProduct = () => {
            const name = document.getElementById('cat-name-input').value.trim();
            const unit = document.getElementById('cat-unit-input').value;
            const price = parseNum(document.getElementById('cat-price-input').value);
            if (!name || price === 0) return;

            if (editingProductId) {
                update(ref(db, `catalog/${editingProductId}`), { name, unit, price });
                editingProductId = null;
                document.getElementById('cat-main-btn').innerText = "Agregar";
            } else {
                push(ref(db, 'catalog'), { name, unit, price });
            }
            document.getElementById('cat-name-input').value = '';
            document.getElementById('cat-price-input').value = '0';
        };

        window.prepareEditProduct = (id) => {
            const p = window.catalog.find(x => x.id === id);
            document.getElementById('cat-name-input').value = p.name;
            document.getElementById('cat-unit-input').value = p.unit;
            document.getElementById('cat-price-input').value = formatNumber(p.price);
            editingProductId = id;
            document.getElementById('cat-main-btn').innerText = "Guardar";
        };

        window.deleteProduct = (id) => { if(confirm("¿Eliminar?")) remove(ref(db, `catalog/${id}`)); };

        function renderCatalog() {
            const tb = document.getElementById('catalog-table-body');
            tb.innerHTML = window.catalog.map(p => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-xs font-black uppercase italic">${p.name}</td>
                    <td class="p-4 text-right font-black">$${formatNumber(p.price)}</td>
                    <td class="p-4 text-center space-x-2">
                        <button onclick="prepareEditProduct('${p.id}')" class="text-blue-400"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-300"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        // --- FUNCIONES ORDENES ---
        window.switchTab = (tab) => {
            ['dashboard', 'orders', 'shopping', 'accounting', 'client'].forEach(t => {
                document.getElementById('view-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.remove('active');
            });
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
        };

        window.handleExpressToggle = () => {
            isExpressActive = document.getElementById('express-toggle').checked;
            document.getElementById('express-label').innerText = isExpressActive ? "EXPRESS (+25%)" : "Normal";
            renderTempOrder();
        };

        window.filterOrderSelect = () => {
            const term = document.getElementById('order-cat-search').value.toLowerCase();
            const resDiv = document.getElementById('order-search-results');
            if(term.length < 1) { resDiv.classList.add('hidden'); return; }
            const filtered = window.catalog.filter(p => p.name.toLowerCase().includes(term));
            resDiv.innerHTML = filtered.map(p => `
                <div onclick="selectProduct('${p.id}')" class="p-4 hover:bg-slate-50 cursor-pointer border-b flex justify-between font-bold uppercase text-[10px]">
                    <span>${p.name}</span><span>$${formatNumber(p.price)}</span>
                </div>`).join('');
            resDiv.classList.remove('hidden');
        };

        window.selectProduct = (id) => {
            selectedProduct = window.catalog.find(p => p.id === id);
            document.getElementById('order-cat-search').value = selectedProduct.name;
            document.getElementById('order-search-results').classList.add('hidden');
            document.getElementById('item-config-area').classList.remove('hidden');
            document.getElementById('field-width').classList.toggle('hidden', selectedProduct.unit !== 'm2');
            document.getElementById('field-height').classList.toggle('hidden', selectedProduct.unit !== 'm2');
        };

        window.addItemToOrder = () => {
            const qty = parseInt(document.getElementById('order-item-qty').value) || 1;
            let area = 1, w = 0, h = 0;
            if(selectedProduct.unit === 'm2') {
                w = parseFloat(document.getElementById('order-item-width').value) || 1;
                h = parseFloat(document.getElementById('order-item-height').value) || 1;
                area = w * h;
            }
            tempOrderItems.push({...selectedProduct, qty, area, width: w, height: h});
            renderTempOrder();
            document.getElementById('item-config-area').classList.add('hidden');
            document.getElementById('order-cat-search').value = '';
        };

        function renderTempOrder() {
            let total = 0;
            const cont = document.getElementById('order-temp-list');
            cont.innerHTML = tempOrderItems.map((item, idx) => {
                let p = isExpressActive ? Math.round(item.price * 1.25) : item.price;
                let sub = Math.round(p * item.area * item.qty);
                total += sub;
                return `<div class="flex justify-between bg-white p-3 rounded-xl border text-[10px] font-bold uppercase">
                    <span>${item.qty}x ${item.name}</span><span>$${formatNumber(sub)}</span>
                </div>`;
            }).join('');
            document.getElementById('order-total-display').innerText = '$' + formatNumber(total);
        }

        window.confirmOrder = () => {
            const client = document.getElementById('order-client').value.trim();
            const phone = document.getElementById('order-phone').value.trim();
            const delivery = document.getElementById('order-delivery').value;
            const advance = parseNum(document.getElementById('order-advance').value);
            if(!client || tempOrderItems.length === 0) return;

            let total = 0;
            const items = tempOrderItems.map(i => {
                let p = isExpressActive ? Math.round(i.price * 1.25) : i.price;
                total += Math.round(p * i.area * i.qty);
                return { name: i.name, qty: i.qty, price: p, area: i.area };
            });

            const orderId = 'W-' + (1000 + window.orders.length + 1);
            push(ref(db, 'orders'), { 
                orderId, client, phone, delivery, items, total, advance, 
                status: 'pending', date: new Date().toLocaleDateString(), isExpress: isExpressActive 
            });
            closeModal();
        };

        window.updateStatus = (id, s) => { update(ref(db, `orders/${id}`), { status: s }); };
        window.deleteOrder = (id) => { if(confirm("¿Borrar?")) remove(ref(db, `orders/${id}`)); };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.openNormalModal = () => { document.getElementById('modal').classList.remove('hidden'); tempOrderItems = []; renderTempOrder(); };
        window.toggleDetails = (id) => document.getElementById(`details-${id}`).classList.toggle('open');

        function renderOrders() {
            const cont = document.getElementById('orders-container');
            cont.innerHTML = window.orders.slice().reverse().map(o => `
                <div class="bg-white rounded-[2rem] border p-6">
                    <div class="flex justify-between items-center">
                        <div onclick="toggleDetails('${o.id}')" class="cursor-pointer">
                            <p class="font-black uppercase italic">${o.client}</p>
                            <p class="text-[8px] text-slate-400">ID: ${o.orderId} | ENTREGA: ${o.delivery}</p>
                        </div>
                        <select onchange="updateStatus('${o.id}', this.value)" class="p-2 rounded-lg bg-slate-100 text-[10px] font-bold">
                            <option value="pending" ${o.status==='pending'?'selected':''}>Pendiente</option>
                            <option value="ready" ${o.status==='ready'?'selected':''}>Listo ✅</option>
                            <option value="delivered">Entregado 🚚</option>
                        </select>
                    </div>
                    <div id="details-${o.id}" class="details-panel mt-4 p-4 bg-slate-50 rounded-xl text-xs font-bold">
                        ${o.items.map(i => `<div>${i.qty}x ${i.name}</div>`).join('')}
                        <div class="mt-2 border-t pt-2 flex justify-between"><span>TOTAL</span><span>$${formatNumber(o.total)}</span></div>
                        <button onclick="deleteOrder('${o.id}')" class="mt-4 text-red-300 text-[10px]">ELIMINAR</button>
                    </div>
                </div>`).join('');
        }

        function updateDashboardStats() {
            document.getElementById('stat-pending').innerText = window.orders.filter(o => o.status !== 'delivered').length;
        }

        function renderShoppingList() {} // Opcional implementar lógica nube
        window.checkTrack = () => {}; // Opcional implementar lógica nube
    </script>
</body>
</html>
