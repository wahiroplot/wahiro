<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Unidos de Olmos v35.9 - Definitiva</title>
    <style>
        body { background-color: #1e3a8a; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        header { background-color: #172554; padding: 15px; border-bottom: 2px solid #1e40af; display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; background-color: #172554; border-bottom: 2px solid #1e40af; overflow-x: auto; }
        nav button { flex: 1; padding: 12px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; white-space: nowrap; }
        nav button.active { color: white; border-bottom: 4px solid #dc2626; }
        .cont { padding: 15px; }
        .box { background-color: #172554; border-radius: 12px; overflow: hidden; border: 1px solid #1e40af; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #1e40af; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>v35.9</h1>
        <label>Edición: <input type="checkbox" id="modoEdicion" onchange="renderizar()"></label>
    </header>

    <nav>
        <button onclick="cambiarSolapa('general')" id="btn-general" class="active">General</button>
        <button onclick="cambiarSolapa('nacional')" id="btn-nacional">Nacional</button>
        <button onclick="cambiarSolapa('amateur')" id="btn-amateur">Amateur</button>
        <button onclick="cambiarSolapa('cuotas')" id="btn-cuotas">Cuotas</button>
    </nav>

    <main class="cont">
        <div class="box"><table id="listaJugadores"></table></div>
        <div id="area-botones"></div>
    </main>

    <script>
        let solapaActual = 'general', jugadores = JSON.parse(localStorage.getItem('plantel')) || [];
        
        function cambiarSolapa(s) {
            solapaActual = s;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + s).classList.add('active');
            renderizar();
        }

        function renderizar() {
            localStorage.setItem('plantel', JSON.stringify(jugadores));
            const tbody = document.getElementById('listaJugadores'), btns = document.getElementById('area-botones'), edit = document.getElementById('modoEdicion').checked;
            tbody.innerHTML = ''; btns.innerHTML = '';
            
            jugadores.sort((a, b) => a.nombre.localeCompare(b.nombre)).forEach((j, i) => {
                if (solapaActual === 'general' || (solapaActual === 'nacional' && j.ligaN) || (solapaActual === 'amateur' && j.ligaA)) {
                    tbody.innerHTML += `<tr><td><b>${j.nombre}</b><br><small style="color:#60a5fa">${j.dni}</small></td>
                    <td style="text-align:right">
                        ${solapaActual === 'general' ? `<input type="checkbox" ${j.ligaN?'checked':''} ${edit?'':'disabled'} onchange="jugadores[${i}].ligaN=this.checked; renderizar()"> N <input type="checkbox" ${j.ligaA?'checked':''} ${edit?'':'disabled'} onchange="jugadores[${i}].ligaA=this.checked; renderizar()"> A` : ''}
                        ${edit ? `<button onclick="jugadores.splice(${i},1); renderizar()">❌</button>` : ''}
                    </td></tr>`;
                }
            });
            btns.innerHTML = `<button class="btn" style="background:#2563eb" onclick="agregar()">+ AGREGAR JUGADOR</button>`;
        }

        function agregar() { 
            let a = prompt("Apellido"), n = prompt("Nombre"), d = prompt("DNI"); 
            if(a && n) jugadores.push({nombre: `${a.toUpperCase()}, ${n}`, dni: d || "00.000.000", ligaN: false, ligaA: false}); 
            renderizar(); 
        }

        cambiarSolapa('general');
    </script>
</body>
</html>
